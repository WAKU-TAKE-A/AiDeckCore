; deck2pptx default theme
;
; All numeric values that control rendered appearance live here, so that
; tuning a number means editing this file, not hunting through the
; renderer source. Sections map 1:1 to Theme sub-namespaces, e.g.
; [flow] -> theme.flow.*
;
; Units:
;   - color   : 6-digit hex, no "#" (e.g. 0F4C81)
;   - *_pt    : points
;   - everything else with no suffix and not in [calibration]/[bullet
;     weight/indent] is inches.

[color]
primary    = 0F4C81
text       = 333333
text_light = 666666
background = FFFFFF
accent     = 00A86B
surface    = F5F7FA
border     = CCD3DC
flow_fill  = EFF6FF
flow_line  = 2563EB
flow_text  = 1E3A8A

[font]
name        = Calibri
name_code   = Consolas
size_title             = 22
size_subtitle          = 20
size_body              = 18
size_body_semi_small   = 16
size_body_small        = 14
size_body_extra_small  = 12
; Only reached if a Theme could not be resolved at all (defensive fallback;
; in the normal build pipeline theme.font.size_body always wins instead).
fallback_size_level0 = 20.0
fallback_size_other  = 16.0

[layout]
margin_x       = 0.5
margin_y       = 0.5
title_height   = 0.4
title_body_gap = 0.2
element_gap    = 0.15
min_remaining_height = 1.0
slide_width_landscape  = 13.333
slide_height_landscape = 7.5
slide_width_portrait   = 7.5
slide_height_portrait  = 13.333
; Y-offset applied when a slide/deck sets content_align.
align_offset_small = 0.3
align_offset_large = 0.6
; Manual (no-placeholder) title slide box sizes.
title_slide_title_box_height    = 1.5
title_slide_subtitle_box_height = 1.0
; Vertical position of the title on a title-only slide, as a fraction of
; slide height (1/3 in the original implementation).
title_slide_position_ratio = 0.333333

[text]
line_height = 0.35
min_height  = 0.4
padding     = 0.00
fallback_chars_per_line = 60

[bullet]
line_height = 0.32
min_height  = 0.8
padding     = 0.00
; indent = indent_per_level * (level + 1)
indent_per_level      = 0.2
level_weight_default  = 1.0
level_weight_indented = 0.8

[image]
caption_height  = 0.3
gallery_padding = 0.1

[table]
placeholder_init_height = 1.0
header_fill_color       = EFF6FF
header_font_size        = 16
cell_font_size          = 14
border_color            = 000000
border_width_pt         = 1.0

[flow]
node_width      = 1.5
node_height     = 0.5
node_gap        = 0.5
arrow_min_length = 0.1
arrow_thickness  = 0.2
line_offset      = 0.1

[tree]
node_width             = 1.5
node_height            = 0.4
vertical_gap           = 0.15
horizontal_gap         = 0.4
connector_line_width_pt = 1.5

[code]
caption_height = 0.4
; box_height = max(min_height, line_count * line_height_factor + height_padding)
line_height_factor = 0.25
height_padding      = 0.2
min_height           = 1.0

[comparison]
title_height = 0.5
padding      = 0.1
fallback_chars_per_line = 30

[timeline]
event_height          = 0.8
label_width           = 1.5
line_x_offset         = 1.6
line_width            = 0.05
line_vertical_padding = 0.1
content_x_offset      = 1.8

[split]
gap             = 0.2
title_box_height = 0.4
title_advance    = 0.5

[mermaid]
default_height = 3.0

[calibration]
; Fixed unit-conversion constants used when interpreting a template's
; first slide for --calib-first-slide. Not really "design" numbers, but
; centralized here too per project policy (everything tunable lives in
; theme.ini, nothing buried in code).
emu_per_inch = 914400.0
pt_to_emu    = 12700.0
; Approximate line-height multiplier (1 pt font -> ~1.2 pt line height).
line_height_factor = 1.2
; Used only if a text frame's width is unknown when estimating chars/inch.
fallback_cpi = 10.0
; Assumed content width (inches) when content_width is not yet known.
fallback_width_inches = 10.0
